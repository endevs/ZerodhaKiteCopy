# Local full-stack mirror (same wiring as prod). App: http://localhost:5175
# Copy backend/env_template.txt → backend/.env and set secrets before first up.

name: zerodhakite

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      TRUST_PROXY: "1"
      SERVER_PORT: "8003"
      SERVER_HOST: "0.0.0.0"
      DATABASE_PATH: /app/data/database.db
    volumes:
      - zerodhakite_data:/app/data
    # Published on all interfaces (0.0.0.0:8003). Lock down with host firewall / AWS SG if needed.
    ports:
      - "8003:8003"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE: ""
        REACT_APP_SOCKET_BASE: ""
    ports:
      - "5175:80"
    depends_on:
      - backend

volumes:
  zerodhakite_data:
