# Local full-stack mirror (same wiring as prod). App: http://localhost:5175
# Copy backend/env_template.txt → backend/.env and set secrets before first up.

name: zerodhakite

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_TIMESFM: "1"
        INSTALL_MOIRAI: "0"
    env_file:
      - ./backend/.env
    environment:
      TRUST_PROXY: "1"
      SERVER_PORT: "8003"
      SERVER_HOST: "0.0.0.0"
      DATABASE_PATH: /app/data/database.db
      EVENTLET_NO_GREENDNS: "yes"
      PLAYWRIGHT_IN_DOCKER: "1"
      PLAYWRIGHT_DEBUG_DIR: /app/data
      DEBUG_LOG_PATH: /app/data/debug-c3dc96.log
      DISPLAY: ":99"
      KITE_AUTOMATION_HEADED: "1"
      TIMESFM_MODEL_PATH: /app/timesfm_model
      MOIRAI_MODEL_PATH: /app/moirai_model
      LSTM_MODEL_DIR: /app/models
      PREDICTION_ENABLE_TIMESFM: "1"
      PREDICTION_ENABLE_LSTM: "1"
      PREDICTION_ENABLE_MOIRAI: "0"
      # Kite redirect for Playwright must hit this container (set in backend/.env too):
      # BACKEND_URL=http://localhost:8003
      # Optional auto-auth (also read from backend/.env via env_file):
      # KITE_AUTOMATION_USER_<app_user_id>_USER_ID=
      # KITE_AUTOMATION_USER_<app_user_id>_PASSWORD=
      # KITE_AUTOMATION_USER_<app_user_id>_TOTP_SECRET=
    # Chromium needs extra shared memory in Docker.
    shm_size: "1gb"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      # Host ./data — survives rebuilds; never use `docker compose down -v` on a bind mount.
      - ./data:/app/data
      - ./data/timesfm_model:/app/timesfm_model
      - ./data/moirai_model:/app/moirai_model
      - ./data/models:/app/models
    # Published on all interfaces (0.0.0.0:8003). Lock down with host firewall / AWS SG if needed.
    ports:
      - "8003:8003"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE: ""
        REACT_APP_SOCKET_BASE: ""
    ports:
      - "5175:80"
    depends_on:
      - backend
