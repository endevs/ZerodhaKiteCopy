# Production on EC2 (alongside other stacks). Project name isolates networks/volumes.
# Env: copy backend/.env.production.example → backend/.env.production (gitignored) on the server.
# Use: docker compose -f docker-compose.prod.yml up -d --build

name: zerodhakite

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_TIMESFM: "1"
        INSTALL_MOIRAI: "0"
    env_file:
      - ./backend/.env.production
    environment:
      TRUST_PROXY: "1"
      SERVER_PORT: "8003"
      SERVER_HOST: "0.0.0.0"
      DATABASE_PATH: /app/data/database.db
      PLAYWRIGHT_IN_DOCKER: "1"
      TIMESFM_MODEL_PATH: /app/timesfm_model
      MOIRAI_MODEL_PATH: /app/moirai_model
      LSTM_MODEL_DIR: /app/models
      PREDICTION_ENABLE_TIMESFM: "1"
      PREDICTION_ENABLE_LSTM: "1"
      PREDICTION_ENABLE_MOIRAI: "0"
    shm_size: "1gb"
    volumes:
      - ./data:/app/data
      - ./data/timesfm_model:/app/timesfm_model
      - ./data/moirai_model:/app/moirai_model
      - ./data/models:/app/models
    # All interfaces :8003 — restrict with security group / firewall; prefer :5175 for browsers.
    ports:
      - "8003:8003"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE: ""
        REACT_APP_SOCKET_BASE: ""
    ports:
      - "5175:80"
    depends_on:
      - backend
    restart: unless-stopped
