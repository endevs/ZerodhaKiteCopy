# Build and push multi-arch (linux/amd64, linux/arm64) images to Docker Hub.
# Configure repository secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN.
# Optional repository variable: DOCKERHUB_NAMESPACE (defaults to DOCKERHUB_USERNAME).
#
# Triggers: manual workflow_dispatch, or push to main when backend/frontend change.

name: Docker Hub multi-arch

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag (e.g. latest or 1.0.0)
        type: string
        default: latest
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/docker-hub-push.yml"

concurrency:
  group: docker-hub-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  push:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' && secrets.DOCKERHUB_TOKEN != '' }}
    env:
      IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || 'latest' }}
      NS: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate image namespace
        run: |
          if [ -z "${NS}" ]; then
            echo "::error::Set Actions secret DOCKERHUB_USERNAME or repository variable DOCKERHUB_NAMESPACE"
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.NS }}/zerodhakite-backend:${{ env.IMAGE_TAG }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.NS }}/zerodhakite-frontend:${{ env.IMAGE_TAG }}
